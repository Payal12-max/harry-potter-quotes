<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Wizarding Quote Generator</title>
  <link rel="stylesheet" href="sty.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <h1>🪄 The Wizarding Quote Generator</h1>

    <!-- Theme Toggle -->
    <button id="theme-toggle">Switch Theme</button>
    

    <!-- Quote Display -->
    <div id="quote-box" class="fade">
      <p id="quote-text">Click the button to get a magical quote!</p>
      <p id="quote-character"></p>
    </div>

    <!-- Buttons -->
    <div class="buttons"> 
      <button id="new-quote">Get New Quote</button>
      <button id="add-favorite">❤️ Add to Favorites</button>
    </div>

    <!-- Favorites Section -->
    <h2>✨ Your Favorite Quotes</h2>
    <ul id="favorites-list"></ul>
    <button id="clear-favorites">Clear All Favorites</button>
  </div>

  <script src="script9.js"></script>
</body>
</html>
